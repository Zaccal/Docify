root = "."
tmp_dir = "tmp"

[build]
cmd = "GOCACHE=$PWD/tmp/go-cache go build -mod=vendor -o ./tmp/excel-service ."
entrypoint = ["./tmp/excel-service"]
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["tmp", "vendor", "testdata"]
exclude_regex = ["_test.go"]
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false
keep_scroll = true
