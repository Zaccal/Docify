name: Docify

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    init: true
    ports:
      - '3001:3001'
    env_file:
      - path: apps/web/.env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/Docify
      EXCEL_SERVICE_URL: http://excel-service:3002
    depends_on:
      excel-service:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  excel-service:
    build:
      context: apps/excel-service
      dockerfile: Dockerfile
    init: true
    ports:
      - '${EXCEL_SERVICE_PORT:-3002}:3002'
    env_file:
      - path: apps/excel-service/.env
        required: false
    environment:
      PORT: 3002
    restart: unless-stopped

  postgres:
    image: postgres
    container_name: Docify-postgres
    environment:
      POSTGRES_DB: Docify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - Docify_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  Docify_postgres_data:
