name: Docify

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    init: true
    ports:
      - '3001:3001'
    env_file:
      - path: apps/web/.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL}
      EXCEL_SERVICE_URL: http://excel-service:3002
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      TEMPLATE_DIR: /app/templates
    depends_on:
      excel-service:
        condition: service_started
    restart: unless-stopped

  excel-service:
    build:
      context: apps/excel-service
      dockerfile: Dockerfile
    init: true
    ports:
      - '${EXCEL_SERVICE_PORT:-3002}:3002'
    env_file:
      - path: apps/excel-service/.env
        required: false
    environment:
      PORT: 3002
      TEMPLATE_PATH: /templates
    restart: unless-stopped
