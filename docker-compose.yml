name: Docify

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    init: true
    expose:
      - '3001'
    env_file:
      - path: apps/web/.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL}
      EXCEL_SERVICE_URL: http://excel-service:3002
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      TEMPLATE_DIR: /app/templates
    depends_on:
      excel-service:
        condition: service_started
    restart: unless-stopped

  excel-service:
    build:
      context: apps/excel-service
      dockerfile: Dockerfile
    init: true
    expose:
      - '3002'
    env_file:
      - path: apps/excel-service/.env
        required: false
    environment:
      PORT: 3002
      TEMPLATE_PATH: /templates
    restart: unless-stopped

  nginx:
    image: nginx:alpine-slim
    depends_on:
      - web
      - excel-service
    volumes:
      - ./deployment/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/certs:/etc/nginx/certs:ro
    ports:
      - '80:80'
      - '443:443'
